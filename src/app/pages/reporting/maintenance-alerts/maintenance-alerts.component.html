<div class="card">
  <div class="card-header d-flex align-items-center justify-content-between">
    <h5>Alertes de maintenance</h5>
    <div class="d-flex gap-2">
      <input type="number" class="form-control" placeholder="Seuil km" [(ngModel)]="threshold">
      <button class="btn btn-primary" (click)="loadAlerts()">Filtrer</button>
      <button class="btn btn-outline-secondary" (click)="clearThreshold()">Effacer</button>
    </div>
  </div>
  <div class="card-body">
    <div *ngIf="loading">Chargement...</div>
    <div *ngIf="error" class="text-danger">{{error}}</div>
    <table *ngIf="!loading && alerts.length" class="table table-striped">
      <thead>
        <tr>
          <th>#</th>
          <th>Immatriculation</th>
          <th>Modèle</th>
          <th>Kilométrage</th>
          <th>Seuil</th>
          <th>Km dépassement</th>
          <th>Statut</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let a of alerts; index as i">
          <td>{{i + 1}}</td>
          <td>{{a.immatriculation}}</td>
          <td>{{a.modele}}</td>
          <td>{{a.kilometrage | number}}</td>
          <td>{{ getSeuil(a) | number }}</td>
          <td>{{ getDepassement(a) | number }}</td>
          <td>{{a.statut}}</td>
        </tr>
      </tbody>
    </table>
    <div *ngIf="!loading && !alerts.length" class="text-muted">Aucune alerte trouvée.</div>
  </div>
</div>
