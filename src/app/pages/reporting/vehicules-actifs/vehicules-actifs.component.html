<div class="container-fluid py-4">
  <div class="row mb-4">
    <div class="col-lg-12">
      <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
        <div>
          <h1 class="h3 mb-1">Reporting Vehicules Actifs</h1>
          <p class="text-muted mb-0">Classement par nombre de missions et distance totale</p>
        </div>
        <div class="d-flex align-items-center gap-2">
          <input
            type="number"
            class="form-control"
            style="width: 120px"
            min="1"
            [(ngModel)]="limit"
            placeholder="Limit">
          <button class="btn btn-primary" (click)="applyLimit()">Appliquer</button>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="error" class="alert alert-danger alert-dismissible fade show" role="alert">
    <i class="fas fa-exclamation-circle me-2"></i>{{ error }}
    <button type="button" class="btn-close" (click)="error = ''" aria-label="Close"></button>
  </div>

  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Chargement...</span>
    </div>
  </div>

  <div *ngIf="!loading" class="row">
    <div class="col-lg-12">
      <div class="card shadow-sm">
        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <thead class="table-light">
              <tr>
                <th class="py-3">Vehicule</th>
                <th class="py-3">Nombre de Missions</th>
                <th class="py-3">Distance Totale (km)</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let item of items">
                <td class="py-3">
                  <span class="badge bg-info text-dark">{{ getImmatriculation(item) }}</span>
                </td>
                <td class="py-3">{{ getMissionCount(item) }}</td>
                <td class="py-3">{{ getTotalDistance(item) | number : '1.1-2' }}</td>
              </tr>
              <tr *ngIf="items.length === 0">
                <td colspan="3" class="text-center py-5 text-muted">
                  <i class="fas fa-inbox fa-3x mb-3 d-block"></i>
                  Aucune donnee d'activite
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
